name: Build APK
on:
  push:
    branches: [main, master]
    tags:
      - "v*" # Trigger on version tags
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :aiostreams:assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: aiostreams-debug-apk
          path: aiostreams/build/outputs/apk/debug/*.apk

      - name: Build Release APK
        run: ./gradlew :aiostreams:assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: aiostreams-release-apk
          path: aiostreams/build/outputs/apk/release/*.apk

      # Create GitHub Release
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            aiostreams/build/outputs/apk/debug/*.apk
            aiostreams/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
