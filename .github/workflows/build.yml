name: Build APK
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > aiostreams-release.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew :aiostreams:assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: aiostreams/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate repo index
        run: |
          mkdir -p repo/apk
          mkdir -p repo/icon
          cp aiostreams/build/outputs/apk/release/*.apk repo/apk/

          # Copy icon (use package name as filename like other repos do)
          cp aiostreams/res/mipmap-xxxhdpi/ic_launcher.png repo/icon/eu.kanade.tachiyomi.animeextension.all.aiostreams.png

          # Get version from build.gradle
          VERSION_CODE=$(grep 'extVersionCode' aiostreams/build.gradle | head -1 | grep -oP '\d+')
          VERSION="14.${VERSION_CODE}"
          APK_NAME="aniyomi-all.aiostreams-v${VERSION}.apk"

          # Rename APK to match expected format
          mv repo/apk/*.apk "repo/apk/${APK_NAME}"

          # Source ID calculated from MD5 of "aiostreams/all/1" (name.lowercase/lang/versionId)
          SOURCE_ID="8532064095094159513"

          # Generate index.min.json 
          printf '%s' '[{"name":"Aniyomi: AIOStreams","pkg":"eu.kanade.tachiyomi.animeextension.all.aiostreams","apk":"'"${APK_NAME}"'","lang":"all","code":'"${VERSION_CODE}"',"version":"'"${VERSION}"'","nsfw":0,"sources":[{"name":"AIOStreams","lang":"all","id":"'"${SOURCE_ID}"'","baseUrl":"https://graphql.anilist.co"}]}]' > repo/index.min.json

          # Generate index.json (pretty-printed)
          cat > repo/index.json << EOF
          [
            {
              "name": "Aniyomi: AIOStreams",
              "pkg": "eu.kanade.tachiyomi.animeextension.all.aiostreams",
              "apk": "${APK_NAME}",
              "lang": "all",
              "code": ${VERSION_CODE},
              "version": "${VERSION}",
              "nsfw": 0,
              "sources": [
                {
                  "name": "AIOStreams",
                  "lang": "all",
                  "id": "${SOURCE_ID}",
                  "baseUrl": "https://graphql.anilist.co"
                }
              ]
            }
          ]
          EOF

          # Generate repo.json (required metadata file)
          cat > repo/repo.json << 'EOF'
          {
            "meta": {
              "name": "AIOStreams Extension",
              "shortName": "AIOStreams",
              "website": "https://github.com/worldInColors/aiostreams-extension"
            }
          }
          EOF

      - name: Deploy to repo branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: repo
          force_orphan: true
