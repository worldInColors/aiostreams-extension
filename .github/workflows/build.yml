name: Build APK
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > aiostreams-release.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew :aiostreams:assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: aiostreams/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate repo index
        run: |
          mkdir -p repo/apk
          mkdir -p repo/icon
          cp aiostreams/build/outputs/apk/release/*.apk repo/apk/

          # Copy icon (use package name as filename like other repos do)
          cp aiostreams/res/mipmap-xxxhdpi/ic_launcher.png repo/icon/eu.kanade.tachiyomi.animeextension.all.aiostreams.png

          # Get version from build.gradle
          VERSION_CODE=$(grep 'extVersionCode' aiostreams/build.gradle | head -1 | grep -oP '\d+')
          VERSION="14.${VERSION_CODE}"
          APK_NAME="aniyomi-all.aiostreams-v${VERSION}.apk"

          # Rename APK to match expected format
          mv repo/apk/*.apk "repo/apk/${APK_NAME}"

          # Download and run the Inspector to generate proper index
          INSPECTOR_LINK="$(curl -s "https://api.github.com/repos/komikku-app/aniyomi-extensions-inspector/releases/latest" | jq -r '.assets[0].browser_download_url')"
          curl -L "$INSPECTOR_LINK" -o ./Inspector.jar
          java -jar ./Inspector.jar "repo/apk" "output.json" "tmp"

          # Export variables for Python script
          export VERSION_CODE APK_NAME VERSION

          # Parse inspector output and create index files
          python3 << 'PYTHON_SCRIPT'
          import json
          import os
          import sys

          version_code = int(os.environ.get("VERSION_CODE", "1"))
          apk_name = os.environ.get("APK_NAME", "")
          version = os.environ.get("VERSION", "")

          with open("output.json", "r") as f:
              inspector_data = json.load(f)

          print(f"Inspector found packages: {list(inspector_data.keys())}")

          # Build index data from inspector output
          index_data = []
          pkg = "eu.kanade.tachiyomi.animeextension.all.aiostreams"
          
          if pkg in inspector_data:
              sources = inspector_data[pkg]
              print(f"Found {len(sources)} source(s) for {pkg}")
              entry = {
                  "name": "Aniyomi: AIOStreams",
                  "pkg": pkg,
                  "apk": apk_name,
                  "lang": "all",
                  "code": version_code,
                  "version": version,
                  "nsfw": 0,
                  "sources": []
              }
              for source in sources:
                  print(f"  Source: {source}")
                  entry["sources"].append({
                      "name": source["name"],
                      "lang": source["lang"],
                      "id": source["id"],
                      "baseUrl": source["baseUrl"]
                  })
              index_data.append(entry)
          else:
              print(f"ERROR: Package {pkg} not found in inspector output!")
              print(f"Inspector data: {json.dumps(inspector_data, indent=2)}")
              sys.exit(1)

          # Write minified JSON (no trailing newline)
          with open("repo/index.min.json", "w") as f:
              json.dump(index_data, f, separators=(",", ":"), ensure_ascii=False)

          # Write pretty JSON  
          with open("repo/index.json", "w") as f:
              json.dump(index_data, f, indent=2, ensure_ascii=False)
          
          print(f"Generated index.min.json: {index_data}")
          PYTHON_SCRIPT

          # Generate repo.json (required metadata file - no indentation)
          echo '{"meta":{"name":"AIOStreams Extension","shortName":"AIOStreams","website":"https://github.com/worldInColors/aiostreams-extension"}}' > repo/repo.json

      - name: Deploy to repo branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: repo
          force_orphan: true
